name: Python exe Yapici

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Kodu Klonla
      uses: actions/checkout@v3

    - name: Python Kur
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Bagimliliklari Yukle
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller streamlit

    - name: Exe Dosyasini Olustur
      run: |
        pyinstaller --onefile --copy-metadata streamlit app.py

    - name: Exe Dosyasini GitHub'a Yukle
      uses: actions/upload-artifact@v4
      with:
        name: Sales-Forecast-App
        path: dist/